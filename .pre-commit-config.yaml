default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^helm/
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: mixed-line-ending
      - id: destroyed-symlinks
      - id: check-shebang-scripts-are-executable
        exclude: node_modules/
      - id: check-executables-have-shebangs
        exclude: node_modules/
      - id: no-commit-to-branch
        args: [--branch, develop, --branch, main]

  # Dockerfile linting
  - repo: local
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfiles
        description: Runs hadolint Docker image to lint Dockerfiles
        language: docker_image
        types: ["dockerfile"]
        entry: ghcr.io/hadolint/hadolint hadolint

  # Shell scripts
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        exclude: node_modules/

  - repo: https://github.com/pecigonzalo/pre-commit-shfmt
    rev: v2.2.0
    hooks:
      - id: shell-fmt-docker
        exclude: node_modules/
        args:
          - -i
          - "4"

  # Secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # Security scanning
  - repo: local
    hooks:
      - id: trivyfs-docker
        name: trivyfs-docker
        entry: ghcr.io/aquasecurity/trivy:latest fs --cache-dir /src/.pre-commit-trivy-cache --exit-code 1 --severity=CRITICAL,HIGH,MEDIUM --skip-dirs=.git,.terraform,node_modules,.next,secrets --skip-files=app/.env --scanners=vuln,secret,misconfig .
        language: docker_image
        pass_filenames: false

      - id: semgrep-docker
        name: semgrep
        description: This hook runs semgrep (a.k.a. semgrep:latest)
        language: docker_image
        # See the comment above for why we set those SEMGREP_XXX variables
        entry: -e SEMGREP_LOG_FILE=/tmp/out.log -e SEMGREP_VERSION_CACHE_PATH=/tmp/cache returntocorp/semgrep:latest semgrep scan --config=auto --error
        pass_filenames: false

  # NextJS Linting
  - repo: local
    hooks:
      - id: eslint-nextjs
        name: ESLint (NextJS)
        entry: bash -c 'cd apps/web && [ -d node_modules ] && pnpm lint || echo "Skipping ESLint - run pnpm install first"'
        language: system
        files: ^apps/web/.*\.[jt]sx?$
        types: [file]
        pass_filenames: false

  # NestJS API Linting
  - repo: local
    hooks:
      - id: eslint-api
        name: ESLint (NestJS API)
        entry: bash -c 'cd apps/api && [ -d node_modules ] && pnpm lint || echo "Skipping ESLint - run pnpm install first"'
        language: system
        files: ^apps/api/.*\.[jt]sx?$
        types: [file]
        pass_filenames: false

  # Unit tests (no DB required)
  - repo: local
    hooks:
      - id: test-api
        name: Unit tests (NestJS API)
        entry: bash -c 'cd apps/api && [ -d node_modules ] && pnpm test || echo "Skipping tests - run pnpm install first"'
        language: system
        files: ^apps/api/.*\.[jt]sx?$
        types: [file]
        pass_filenames: false

      - id: test-web
        name: Unit tests (Next.js)
        entry: bash -c 'cd apps/web && [ -d node_modules ] && pnpm test || echo "Skipping tests - run pnpm install first"'
        language: system
        files: ^apps/web/.*\.[jt]sx?$
        types: [file]
        pass_filenames: false
